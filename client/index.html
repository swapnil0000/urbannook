<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/logo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanNook - Modern Lifestyle Store</title>

  <!-- Cache control for better performance -->
  <meta http-equiv="Cache-Control" content="public, max-age=31536000, immutable" />
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="dns-prefetch" href="https://accounts.google.com" />

  <!-- Preload critical resources with responsive images -->
  <link rel="preload" as="image" href="/assets/hero21.webp" fetchpriority="high" media="(max-width: 768px)" />
  <link rel="preload" as="image" href="/assets/hero2.webp" fetchpriority="high" media="(min-width: 769px)" />
  <link rel="preload" as="script" href="/src/main.jsx" />
  
  <!-- Preload critical fonts (only primary weight - Poppins 400) -->
  <!-- Validates: Requirement 3.2 - Preload only primary font weight -->
  <link rel="preload" as="font" type="font/woff2"
    href="https://fonts.gstatic.com/s/poppins/v20/pxiEyp8kv8JHgFVrJJfecg.woff2"
    crossorigin="anonymous" />

  <!-- Optimized font loading with font-display: swap and subsetting -->
  <!-- Validates: Requirements 3.1, 3.3, 3.4 -->
  <style>
    /* Poppins font with font-display: swap and unicode-range subsetting */
    @font-face {
      font-family: 'Poppins';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/poppins/v20/pxiEyp8kv8JHgFVrJJfecg.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Poppins';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/poppins/v20/pxiByp8kv8JHgFVrLEj6Z1xlFQ.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Poppins';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url(https://fonts.gstatic.com/s/poppins/v20/pxiByp8kv8JHgFVrLCz7Z1xlFQ.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    /* Inter font with font-display: optional for non-critical use */
    /* Validates: Requirement 3.5 - Optional display with timeout */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400;
      font-display: optional;
      src: url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiA.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 500;
      font-display: optional;
      src: url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuI6fAZ9hiA.woff2) format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
  </style>

  <!-- Defer FontAwesome to not block render -->
  <!-- Validates: Requirements 4.2, 4.4 - Defer Font Awesome loading -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  </noscript>

  <!-- Inline critical CSS for above-the-fold content -->
  <style>
    /* Critical CSS - prevents FOUC and improves FCP */
    /* Validates: Requirement 3.4 - Fallback system fonts display immediately */
    body {
      margin: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
    }

    /* Loading skeleton for hero */
    .hero-skeleton {
      min-height: 97vh;
      background: linear-gradient(135deg, #1a2822 0%, #2e443c 100%);
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.8;
      }
    }

    /* Critical hero styles for immediate render */
    .min-h-\[97vh\] {
      min-height: 97vh;
    }
    
    .bg-\[\#1a2822\] {
      background-color: #1a2822;
    }
    
    .text-white {
      color: white;
    }
    
    .font-serif {
      font-family: Georgia, 'Times New Roman', serif;
    }
    
    /* Prevent layout shift */
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Defer third-party scripts until after window load -->
  <!-- Validates: Requirements 4.2, 4.3, 10.4 - Defer third-party scripts -->
  <script>
    // Load Google Sign-In after window load to not block initial render
    window.addEventListener('load', function() {
      var script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      document.body.appendChild(script);
    });
  </script>
</body>

</html>
